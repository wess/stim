name: Release

on:
  push:
    branches: [main]
    paths: ['package.json']

permissions:
  contents: write

jobs:
  check-version:
    name: Check Version Change
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.check.outputs.version }}
      tag: ${{ steps.check.outputs.tag }}
      changed: ${{ steps.check.outputs.changed }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check if version changed
        id: check
        run: |
          CURRENT=$(grep '"version"' package.json | sed 's/.*"version": "\(.*\)".*/\1/')
          PREVIOUS=$(git show HEAD~1:package.json 2>/dev/null | grep '"version"' | sed 's/.*"version": "\(.*\)".*/\1/' || echo "")

          echo "Current: $CURRENT"
          echo "Previous: $PREVIOUS"

          if [ "$CURRENT" != "$PREVIOUS" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "version=$CURRENT" >> $GITHUB_OUTPUT
            echo "tag=v$CURRENT" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    needs: [check-version]
    if: needs.check-version.outputs.changed == 'true'
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
            artifact: stim-linux-x64
          - os: macos-latest
            target: darwin-x64
            artifact: stim-darwin-x64
          - os: macos-14
            target: darwin-arm64
            artifact: stim-darwin-arm64
          - os: windows-latest
            target: windows-x64
            artifact: stim-windows-x64.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run tests
        run: bun test

      - name: Build executable
        run: bun build --compile --target=bun-${{ matrix.target }} --outfile=${{ matrix.artifact }} src/main.ts

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    name: Create Release
    needs: [check-version, build]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Prepare release assets
        run: |
          mkdir -p ./release
          cp ./artifacts/stim-linux-x64/stim-linux-x64 ./release/
          cp ./artifacts/stim-darwin-x64/stim-darwin-x64 ./release/
          cp ./artifacts/stim-darwin-arm64/stim-darwin-arm64 ./release/
          cp ./artifacts/stim-windows-x64.exe/stim-windows-x64.exe ./release/

          chmod +x ./release/stim-*

          cd ./release
          sha256sum * > checksums.txt

      - name: Create tag
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git tag "${{ needs.check-version.outputs.tag }}"
          git push origin "${{ needs.check-version.outputs.tag }}"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Stim ${{ needs.check-version.outputs.tag }}
          tag_name: ${{ needs.check-version.outputs.tag }}
          generate_release_notes: true
          files: |
            ./release/stim-linux-x64
            ./release/stim-darwin-x64
            ./release/stim-darwin-arm64
            ./release/stim-windows-x64.exe
            ./release/checksums.txt
          draft: false
          prerelease: false
